<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('bz-theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
        try {
          var lang = localStorage.getItem('bz-lang');
          if (lang !== 'bg' && lang !== 'en' && lang !== 'ar') lang = 'bg';
          document.documentElement.lang = lang;
          document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Фондация Будни заедно — заедно днес, по-добро утре. Подкрепяме деца и семейства чрез образование, доброта и общност."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,600;0,6..12,700;1,6..12,400&family=Poppins:wght@500;600;700;800&display=swap&subset=cyrillic"
      rel="stylesheet"
    />
    <title>Фондация „Будни заедно“</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
